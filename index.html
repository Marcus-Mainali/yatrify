<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yatrify</title>
    
    <!-- SVG Favicon with a letter in black with a black background (and a subtle white outline for readability) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23000000'/%3E%3Ctext x='50%25' y='58%25' font-size='18' font-family='sans-serif' font-weight='900' fill='%23000000' stroke='%23ffffff' stroke-width='1.5' stroke-linejoin='round' dominant-baseline='middle' text-anchor='middle'%3EY%3C/text%3E%3C/svg%3E" />
    
    <!-- PWA Core Elements -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#09090b" />
    
    <!-- iOS / Safari Native Integration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yatrify" />
    <link rel="apple-touch-icon" href="/yatrify_logo.jpg" />
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('Service Worker registered successfully with scope:', registration.scope);
            })
            .catch((error) => {
              console.error('Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </head>
  <body class="bg-zinc-950 text-white selection:bg-emerald-500 selection:text-black">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
